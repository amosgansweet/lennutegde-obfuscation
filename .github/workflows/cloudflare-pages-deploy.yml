name: Deploy to Cloudflare Pages via API(jlgprotonCF_pages)

on:
  push:
    branches:
      - main    # 生产部署分支
      - dev     # 预览部署分支
  workflow_dispatch: # 手动触发

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set Deployment Environment
        id: set-env
        run: |
          if [ "${GITHUB_REF_NAME}" = "main" ]; then
            echo "env=production" >> $GITHUB_OUTPUT
          else
            echo "env=preview" >> $GITHUB_OUTPUT
          fi

      - name: Trigger Cloudflare Pages Deployment
        id: deploy
        env:
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_PROJECT_NAME: ${{ secrets.CF_PROJECT_NAME }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          DEPLOY_ENV: ${{ steps.set-env.outputs.env }}
        run: |
          echo "Triggering Cloudflare Pages Deployment for ${DEPLOY_ENV}..."
          RESPONSE=$(curl -s -X POST \
            "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/pages/projects/${CF_PROJECT_NAME}/deployments" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" \
            -H "Content-Type: application/json" \
            --data "{
              \"deployment_trigger\": { \"type\": \"manual\" },
              \"environment\": \"${DEPLOY_ENV}\",
              \"metadata\": {
                \"commit_hash\": \"${GITHUB_SHA}\",
                \"commit_message\": \"${GITHUB_EVENT_HEAD_COMMIT_MESSAGE}\",
                \"branch\": \"${GITHUB_REF_NAME}\",
                \"actor\": \"${GITHUB_ACTOR}\"
              }
            }")

          echo "${RESPONSE}" > response.json

          URL=$(jq -r '.result.url' response.json)
          SUCCESS=$(jq -r '.success' response.json)
          echo "url=${URL}" >> $GITHUB_OUTPUT
          echo "success=${SUCCESS}" >> $GITHUB_OUTPUT

          if [ "$SUCCESS" != "true" ]; then
            echo "Deployment failed."
            exit 1
          fi

      - name: Add Deployment Info to GitHub Summary
        if: always()
        run: |
          echo "## ✅ Cloudflare Pages Deployment" >> $GITHUB_STEP_SUMMARY
          echo "**Environment:** ${{ steps.set-env.outputs.env }}" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.event.head_commit.message }}" >> $GITHUB_STEP_SUMMARY
          echo "**Deployment URL:** [${{ steps.deploy.outputs.url }}](${{ steps.deploy.outputs.url }})" >> $GITHUB_STEP_SUMMARY

      - name: Send Telegram Notification (success)
        if: success()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TG_BOT_TOKEN }}/sendMessage" \
          -d chat_id="${{ secrets.TG_CHAT_ID }}" \
          -d text="✅ *Cloudflare Pages Deployment Successful*\n\n*Repo:* ${{ github.repository }}\n*Branch:* ${{ github.ref_name }}\n*Commit:* ${{ github.event.head_commit.message }}\n*URL:* ${{ steps.deploy.outputs.url }}" \
          -d parse_mode="Markdown"

      - name: Send Telegram Notification (failure)
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TG_BOT_TOKEN }}/sendMessage" \
          -d chat_id="${{ secrets.TG_CHAT_ID }}" \
          -d text="❌ *Cloudflare Pages Deployment Failed*\n\n*Repo:* ${{ github.repository }}\n*Branch:* ${{ github.ref_name }}\n*Commit:* ${{ github.event.head_commit.message }}" \
          -d parse_mode="Markdown"
